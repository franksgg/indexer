
upstream jb {
    server web:8080;
}
server {
    listen 80;
    server_name jb;
    location / {

        proxy_pass http://jb;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        #roxy_set_header  X-Real-IP   $remote_addr;
        proxy_set_header Port 1337;
        proxy_redirect http://localhost http://localhost:1337;
    }
 location = /favicon.ico {
    alias /home/app/web/static/images/favicon.ico;
}
    location /static {
    root /home/app/web;
}
}